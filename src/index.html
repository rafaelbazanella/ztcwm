<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ztcwm — ZeroTier Controller Web Manager</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23F5A623'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Inter,sans-serif' font-weight='700' font-size='16' fill='white'%3EZT%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <script>
        (function() {
            var t = localStorage.getItem('zt-theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* MIRROR-START — sole legal home for boot-time literals OUTSIDE theme.ts/shared.ts.
           These four hex values MUST match src/styles/theme.ts dark `:host` and light
           `:host([theme="light"])` --color-bg-primary and --color-text-primary tokens.
           This block is INDEPENDENT of the runtime <zt-app theme=...> toggle in app.ts:74,111
           — the runtime toggle drives :host([theme='light']) inside Lit shadow trees, this
           block drives only <html>/<body> page surfaces visible before Lit hydration. Once Lit
           hydrates, per-component shadow-DOM tokens take over and this block does not double-paint.
           If any of these four hex values change in theme.ts, they MUST be updated here too. */
        html, body { height: 100%; background: #0f1117; color: #e4e6ef; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        html[data-theme="light"], html[data-theme="light"] body { background: #f8f9fc; color: #1a1d2b; }
        /* MIRROR-END */

        html, body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <zt-app></zt-app>
    <script type="module" src="/main.ts"></script>
</body>
</html>
